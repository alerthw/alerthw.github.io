<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Chat with Bot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.3.2/html2canvas.min.js"></script>
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-header">
  <div class="header-left">
    <h2>ChatGPT</h2>
  </div>
  <div class="header-right">
    <button class="clear-history-btn">Очистить диалог</button>
  </div>
</div>
      <div class="modal-overlay">
        <div class="modal">
          <p>Set the role, behavior for the bot</p>
          <input type="text" class="modal-input" placeholder="Type some text..."/>
          <button class="modal-submit">Готово</button>
        </div>
      </div>
      <div class="chat-messages">
        <div class="chat-message">
        </div>
        <div class="examples">
          <h2 class="examples-header"><svg style="color: white" xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" class="bi bi-sun" viewBox="0 0 16 16"> <path d="M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm0 1a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0zm0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13zm8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5zM3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8zm10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0zm-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zm9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707zM4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708z" fill="white"></path></svg>Examples</h2>
          <ul class="examples-list">
            <li><button class="examples-btn" data-text="Explain quantum computing in simple terms">"Explain quantum computing in simple terms" →</button></li>
            <li><button class="examples-btn" data-text="Got any creative ideas for a 10 year old’s birthday?">"Got any creative ideas for a 10 year old’s birthday?" →</button></li>
            <li><button class="examples-btn" data-text="How do I make an HTTP request in Javascript?">"How do I make an HTTP request in Javascript?" →</button></li>
          </ul>
        </div>
      </div>
      <div class="chat-input">
        <input type="text" placeholder="Type your message...">
        <button>Send</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
